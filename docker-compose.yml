version: "3.9"

services:
  instantattend:
    build: .
    container_name: instantattend
    ports:
      - "5000:5000"
    volumes:
      # Persist face data and database across container restarts
      - ./static/faces:/app/static/faces
      - ./Attendance:/app/Attendance
      - ./attendance.db:/app/attendance.db
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
